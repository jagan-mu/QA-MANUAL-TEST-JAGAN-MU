name: Run tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read
    pull-requests: read
    issues: write
    checks: write

jobs:
    run-unit-tests:
        runs-on: ubuntu-latest
        steps:
            - name: Check out Git repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Run Sanity Check tests
              uses: speechify-recruiting/qa-test-action@main
              id: qa-test-action
              with:
                  source-dir: "src"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              timeout-minutes: 5
